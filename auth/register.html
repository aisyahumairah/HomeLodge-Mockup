<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register – HomeLodge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../modernize-bootstrap-free-v2/src/assets/css/styles.min.css">
    <link rel="stylesheet" href="../../modernize-bootstrap-free-v2/src/assets/css/icons/tabler-icons/tabler-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .auth-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #F0FDFA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }

        .form-control:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            border: none;
            background: none;
        }

        .strength-bar {
            height: 4px;
            border-radius: 4px;
            transition: all 0.3s;
            background: #E5E7EB;
            margin-top: 6px;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .req-item {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .req-item.met {
            color: #16A34A;
        }

        .req-item.unmet {
            color: #9CA3AF;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div style="font-size:1.6rem;font-weight:700;color:#2563EB;">🏠 HomeLodge</div>
                <p class="text-muted mt-1" style="font-size:0.9rem;">Create your account to get started</p>
            </div>

            <button class="btn w-100 mb-3 py-2 rounded-3 fw-medium"
                style="background:white;border:1.5px solid #E5E7EB;color:#374151;display:flex;align-items:center;justify-content:center;gap:10px;">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Sign up with Google
            </button>

            <div style="display:flex;align-items:center;gap:12px;color:#9CA3AF;font-size:0.85rem;margin:16px 0;">
                <span style="flex:1;height:1px;background:#E5E7EB;"></span>or register with email<span
                    style="flex:1;height:1px;background:#E5E7EB;"></span>
            </div>

            <form action="login.html">
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-medium" for="regFirst">First Name <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control rounded-3" id="regFirst" placeholder="Ahmad"
                            value="Ahmad">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-medium" for="regLast">Last Name <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control rounded-3" id="regLast" placeholder="Razif"
                            value="Razif">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium" for="regEmail">Email Address <span
                            class="text-danger">*</span></label>
                    <input type="email" class="form-control rounded-3" id="regEmail" placeholder="you@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium" for="regPhone">Phone Number</label>
                    <input type="tel" class="form-control rounded-3" id="regPhone" placeholder="+60 12-345 6789">
                </div>
                <div class="mb-2">
                    <label class="form-label fw-medium" for="regPwd">Password <span class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control rounded-3" id="regPwd" placeholder="Create password"
                            oninput="checkStrength(this.value)">
                        <button type="button" class="password-toggle" onclick="togglePwd('regPwd',this)"><i
                                class="ti ti-eye-off fs-4"></i></button>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill" style="width:0%;background:#E5E7EB;"></div>
                    </div>
                    <div class="d-flex gap-3 mt-2 flex-wrap" id="reqList">
                        <div class="req-item unmet" id="req-len"><i class="ti ti-circle fs-3"></i> 8–12 characters</div>
                        <div class="req-item unmet" id="req-upper"><i class="ti ti-circle fs-3"></i> Uppercase</div>
                        <div class="req-item unmet" id="req-lower"><i class="ti ti-circle fs-3"></i> Lowercase</div>
                        <div class="req-item unmet" id="req-num"><i class="ti ti-circle fs-3"></i> Number</div>
                        <div class="req-item unmet" id="req-special"><i class="ti ti-circle fs-3"></i> Special char
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium" for="regPwdConfirm">Confirm Password <span
                            class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control rounded-3" id="regPwdConfirm"
                            placeholder="Repeat password">
                        <button type="button" class="password-toggle" onclick="togglePwd('regPwdConfirm',this)"><i
                                class="ti ti-eye-off fs-4"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold">Create Account</button>
            </form>

            <p class="text-center mt-4 text-muted" style="font-size:0.9rem;">
                Already have an account? <a href="login.html" class="text-primary fw-semibold">Sign in</a>
            </p>
            <p class="text-center mt-2"><a href="../index.html" class="text-muted" style="font-size:0.8rem;">← Back to
                    Mockup Index</a></p>
        </div>
    </div>
    <script src="../../modernize-bootstrap-free-v2/src/assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../../modernize-bootstrap-free-v2/src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePwd(id, btn) { var i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; btn.innerHTML = i.type === 'text' ? '<i class="ti ti-eye fs-4"></i>' : '<i class="ti ti-eye-off fs-4"></i>'; }
        function checkStrength(v) {
            var checks = { len: /^.{8,12}$/, upper: /[A-Z]/, lower: /[a-z]/, num: /[0-9]/, special: /[^A-Za-z0-9]/ };
            var met = Object.keys(checks).filter(k => checks[k].test(v)).length;
            var colors = ['#E5E7EB', '#DC2626', '#D97706', '#D97706', '#16A34A', '#16A34A'];
            document.getElementById('strengthFill').style.width = (met * 20) + '%';
            document.getElementById('strengthFill').style.background = colors[met];
            ['len', 'upper', 'lower', 'num', 'special'].forEach(function (k) {
                var el = document.getElementById('req-' + k);
                if (checks[k].test(v)) { el.className = 'req-item met'; el.querySelector('i').className = 'ti ti-circle-check fs-3'; }
                else { el.className = 'req-item unmet'; el.querySelector('i').className = 'ti ti-circle fs-3'; }
            });
        }
    </script>
</body>

</html>
