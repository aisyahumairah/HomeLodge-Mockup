<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login – HomeLodge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../modernize-bootstrap-free-v2/src/assets/css/styles.min.css">
    <link rel="stylesheet" href="../modernize-bootstrap-free-v2/src/assets/css/icons/tabler-icons/tabler-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .auth-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #F0FDFA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2563EB;
        }

        .btn-google {
            background: white;
            border: 1.5px solid #E5E7EB;
            color: #374151;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9CA3AF;
            font-size: 0.85rem;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }

        .form-control:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            border: none;
            background: none;
        }

        .alert-locked {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 8px;
            padding: 12px 16px;
            color: #DC2626;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="logo-text">🏠 HomeLodge</div>
                <p class="text-muted mt-1" style="font-size:0.9rem;">Welcome back! Please sign in to continue.</p>
            </div>

            <!-- Locked Account Alert (shown conditionally) -->
            <!-- <div class="alert-locked mb-3 d-flex align-items-center gap-2">
      <i class="ti ti-lock"></i> Your account is locked due to too many failed attempts. Try again in 15 minutes or <a href="forgot-password.html" class="text-danger fw-semibold">reset your password</a>.
    </div> -->

            <button class="btn btn-google w-100 mb-3 py-2 rounded-3" onclick="window.location='../guest/home.html'">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                    <path fill="#FBBC05"
                        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                    <path fill="#34A853"
                        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                </svg>
                Continue with Google
            </button>

            <div class="divider">or sign in with email</div>

            <form action="../guest/home.html">
                <div class="mb-3">
                    <label class="form-label fw-medium" for="loginEmail">Email Address <span
                            class="text-danger">*</span></label>
                    <input type="email" class="form-control rounded-3" id="loginEmail" placeholder="you@example.com"
                        value="ahmad@email.com">
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <label class="form-label fw-medium mb-0" for="loginPassword">Password <span
                                class="text-danger">*</span></label>
                        <a href="forgot-password.html" class="text-primary" style="font-size:0.85rem;">Forgot
                            password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" class="form-control rounded-3" id="loginPassword"
                            placeholder="Enter password" value="Abc@123">
                        <button type="button" class="password-toggle" onclick="togglePwd('loginPassword',this)"><i
                                class="ti ti-eye-off fs-4"></i></button>
                    </div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe" style="font-size:0.9rem;">Remember this
                        device</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold">Sign In</button>
            </form>

            <p class="text-center mt-4 text-muted" style="font-size:0.9rem;">
                Don't have an account? <a href="register.html" class="text-primary fw-semibold">Create account</a>
            </p>
            <p class="text-center mt-2"><a href="../index.html" class="text-muted" style="font-size:0.8rem;">← Back to
                    Mockup Index</a></p>
        </div>
    </div>
    <script src="../modernize-bootstrap-free-v2/src/assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../modernize-bootstrap-free-v2/src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
    <script>
        function togglePwd(id, btn) {
            var input = document.getElementById(id);
            if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '<i class="ti ti-eye fs-4"></i>'; }
            else { input.type = 'password'; btn.innerHTML = '<i class="ti ti-eye-off fs-4"></i>'; }
        }
    </script>
</body>

</html>
