<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password – HomeLodge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../modernize-bootstrap-free-v2/src/assets/css/styles.min.css">
    <link rel="stylesheet" href="../modernize-bootstrap-free-v2/src/assets/css/icons/tabler-icons/tabler-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .auth-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #F0FDFA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .10);
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }

        .form-control:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            border: none;
            background: none;
        }

        .strength-bar {
            height: 5px;
            border-radius: 4px;
            background: #E5E7EB;
            margin-top: 8px;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .3s;
        }

        .req-item {
            font-size: .8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .req-item.met {
            color: #16A34A;
        }

        .req-item.unmet {
            color: #9CA3AF;
        }

        .req-box {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="auth-card">
            <div
                style="width:56px;height:56px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.6rem;color:#2563EB;">
                <i class="ti ti-key"></i>
            </div>
            <div class="text-center mb-4">
                <h4 class="fw-bold" style="color:#111827;">Set new password</h4>
                <p class="text-muted" style="font-size:.9rem;">Your new password must meet the requirements below.</p>
            </div>

            <div class="req-box">
                <p class="fw-semibold mb-2" style="font-size:.85rem;color:#374151;">Password Requirements:</p>
                <div class="row g-1">
                    <div class="col-6">
                        <div class="req-item unmet" id="req-len"><i class="ti ti-circle fs-3"></i> 8–12 characters</div>
                    </div>
                    <div class="col-6">
                        <div class="req-item unmet" id="req-upper"><i class="ti ti-circle fs-3"></i> Uppercase letter
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="req-item unmet" id="req-lower"><i class="ti ti-circle fs-3"></i> Lowercase letter
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="req-item unmet" id="req-num"><i class="ti ti-circle fs-3"></i> Number</div>
                    </div>
                    <div class="col-6">
                        <div class="req-item unmet" id="req-special"><i class="ti ti-circle fs-3"></i> Special character
                        </div>
                    </div>
                </div>
            </div>

            <form action="login.html">
                <div class="mb-3">
                    <label class="form-label fw-medium" for="newPwd">New Password <span
                            class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control rounded-3" id="newPwd"
                            placeholder="Create new password" oninput="checkStrength(this.value)">
                        <button type="button" class="password-toggle" onclick="togglePwd('newPwd',this)"><i
                                class="ti ti-eye-off fs-4"></i></button>
                    </div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="sFill" style="width:0%;background:#E5E7EB;"></div>
                    </div>
                    <div class="d-flex justify-content-between mt-1">
                        <small class="text-muted">Password strength</small>
                        <small id="sLabel" class="text-muted">—</small>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium" for="confirmPwd">Confirm New Password <span
                            class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control rounded-3" id="confirmPwd"
                            placeholder="Repeat new password">
                        <button type="button" class="password-toggle" onclick="togglePwd('confirmPwd',this)"><i
                                class="ti ti-eye-off fs-4"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold">
                    <i class="ti ti-check me-2"></i>Reset Password
                </button>
            </form>
            <p class="text-center mt-3"><a href="../index.html" class="text-muted" style="font-size:.8rem;">← Back to
                    Mockup Index</a></p>
        </div>
    </div>
    <script src="../modernize-bootstrap-free-v2/src/assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../modernize-bootstrap-free-v2/src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePwd(id, btn) { var i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; btn.innerHTML = i.type === 'text' ? '<i class="ti ti-eye fs-4"></i>' : '<i class="ti ti-eye-off fs-4"></i>'; }
        function checkStrength(v) {
            var checks = { len: /^.{8,12}$/, upper: /[A-Z]/, lower: /[a-z]/, num: /[0-9]/, special: /[^A-Za-z0-9]/ };
            var labels = ['', 'Weak', 'Fair', 'Fair', 'Strong', 'Strong'];
            var colors = ['#E5E7EB', '#DC2626', '#D97706', '#D97706', '#16A34A', '#16A34A'];
            var met = Object.keys(checks).filter(k => checks[k].test(v)).length;
            document.getElementById('sFill').style.width = (met * 20) + '%';
            document.getElementById('sFill').style.background = colors[met];
            document.getElementById('sLabel').textContent = labels[met] || '';
            ['len', 'upper', 'lower', 'num', 'special'].forEach(function (k) {
                var el = document.getElementById('req-' + k);
                if (checks[k].test(v)) { el.className = 'req-item met'; el.querySelector('i').className = 'ti ti-circle-check fs-3'; }
                else { el.className = 'req-item unmet'; el.querySelector('i').className = 'ti ti-circle fs-3'; }
            });
        }
    </script>
</body>

</html>
